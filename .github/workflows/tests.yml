name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: content_engine_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run linting
        run: |
          ruff check app/ tests/
          black --check app/ tests/

      - name: Run type checking
        run: |
          mypy app/ --ignore-missing-imports --exclude tests/
        continue-on-error: true

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/content_engine_test
          DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@localhost:5432/content_engine_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/1
          OPENAI_API_KEY: sk-test-dummy-key-for-ci
          ANTHROPIC_API_KEY: sk-ant-test-dummy-key
          ELEVENLABS_API_KEY: test-elevenlabs-key
          PEXELS_API_KEY: test-pexels-key
          TELEGRAM_BOT_TOKEN: 123456:ABC-DEF-test-token
          ENCRYPTION_KEY: test-encryption-key-for-ci-only-32chars
        run: |
          pytest -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Generate test fixtures
        if: always()
        run: |
          python tests/generate_fixtures.py
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install black ruff mypy

      - name: Run Black
        run: black --check app/ tests/

      - name: Run Ruff
        run: ruff check app/ tests/

      - name: Run MyPy
        run: mypy app/ --ignore-missing-imports
        continue-on-error: true

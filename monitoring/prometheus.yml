# Prometheus Configuration for YouTube Shorts Automation

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: 'production'
    project: 'youtube-shorts-automation'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Load alerting rules
rule_files:
  - "/etc/prometheus/alerting_rules.yml"

# Scrape configurations
scrape_configs:
  # FastAPI application metrics
  - job_name: 'fastapi'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Celery workers metrics
  - job_name: 'celery-workers'
    static_configs:
      - targets: ['celery-metrics-exporter:9090']
    scrape_interval: 15s

  # PostgreSQL exporter (if added)
  - job_name: 'postgres'
    static_configs:
      - targets: []  # Add postgres-exporter if configured

  # Redis exporter (if added)
  - job_name: 'redis'
    static_configs:
      - targets: []  # Add redis-exporter if configured

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

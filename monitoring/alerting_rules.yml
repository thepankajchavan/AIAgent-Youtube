# Alerting Rules for YouTube Shorts Automation

groups:
  - name: pipeline_alerts
    interval: 30s
    rules:
      # Critical: High pipeline failure rate
      - alert: HighPipelineFailureRate
        expr: |
          (
            rate(pipeline_failed[5m])
            / 
            rate(pipeline_total[5m])
          ) > 0.2
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High pipeline failure rate ({{ $value | humanizePercentage }})"
          description: "More than 20% of pipelines are failing in the last 5 minutes"

      # Warning: Pipeline taking too long
      - alert: SlowPipelineExecution
        expr: |
          histogram_quantile(0.95, 
            rate(pipeline_duration_seconds_bucket[10m])
          ) > 600
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "95th percentile pipeline duration > 10 minutes"
          description: "Pipelines are taking longer than expected (p95: {{ $value }}s)"

  - name: worker_alerts
    interval: 30s
    rules:
      # Critical: No workers online
      - alert: NoWorkersOnline
        expr: sum(celery_worker_online) == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "No Celery workers are online"
          description: "All Celery workers are offline. Pipeline processing is stopped."

      # Warning: High queue depth
      - alert: HighQueueDepth
        expr: sum(celery_queue_depth) > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High queue depth ({{ $value }} tasks waiting)"
          description: "More than 50 tasks are waiting in queues"

  - name: api_alerts
    interval: 30s
    rules:
      # Critical: High API error rate
      - alert: HighAPIErrorRate
        expr: |
          (
            rate(external_api_errors_total[5m])
            /
            rate(external_api_calls_total[5m])
          ) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High external API error rate ({{ $value | humanizePercentage }})"
          description: "More than 10% of external API calls are failing"

      # Warning: Slow API response time
      - alert: SlowAPIResponse
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket[5m])
          ) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow API response time (p95: {{ $value }}s)"
          description: "95th percentile API response time is above 5 seconds"

  - name: system_alerts
    interval: 30s
    rules:
      # Warning: High memory usage (if node_exporter added)
      - alert: HighMemoryUsage
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage ({{ $value | humanizePercentage }})"
          description: "Memory usage is above 80%"

      # Warning: High disk usage
      - alert: HighDiskUsage
        expr: sum(media_disk_usage_bytes) > 80000000000  # 80GB
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High media disk usage ({{ $value | humanize }}B)"
          description: "Media files are using more than 80GB of disk space"
